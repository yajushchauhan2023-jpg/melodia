<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melodia | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-auth-page="login">
    <div class="shape shape-one" aria-hidden="true"></div>
    <div class="shape shape-two" aria-hidden="true"></div>
    <div class="notes-field" aria-hidden="true"></div>
    <main class="auth-layout">
      <section class="auth-card card">
        <a class="brand auth-brand" href="./login.html"><span class="brand-mark">♪</span><span>Melodia</span></a>
        <p class="eyebrow">Welcome back</p>
        <h1>Log in to continue learning.</h1>
        <p>Your lessons, progress, teacher bookings, and Coach are waiting for you.</p>
        <form class="auth-form" id="loginForm">
          <label>Email<input type="email" value="student@melodia.test" required /></label>
          <label>Password<input type="password" value="melodia123" required /></label>
          <button class="primary-action" type="submit">Log in</button>
        </form>
        <p class="auth-switch">Do not have an account? <a href="./signup.html">Create one here</a>.</p>
      </section>
    </main>
    <div class="questionnaire-modal" id="questionnaireModal" aria-hidden="true">
      <div class="questionnaire-card card">
        <p class="eyebrow">Quick setup</p>
        <h2>Tell Melodia how to teach you.</h2>
        <form id="questionnaireForm">
          <label>What instrument are you learning?
            <select name="instrument" required>
              <option>Piano</option><option>Guitar</option><option>Violin</option><option>Drums</option><option>Flute</option><option>Vocals</option><option>Saxophone</option>
            </select>
          </label>
          <label>What level are you?
            <select name="level" required>
              <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
            </select>
          </label>
          <label>What is your purpose of learning?
            <select name="purpose" required>
              <option>Play songs I love</option><option>Learn music theory</option><option>Prepare for exams</option><option>Improve performance</option><option>Read sheet music</option>
            </select>
          </label>
          <label>How much time can you practice each week?
            <select name="time" required>
              <option>2 hours</option><option>4 hours</option><option>7+ hours</option>
            </select>
          </label>
          <label>What style are you most interested in?
            <select name="style" required>
              <option>Pop songs</option><option>Classical foundations</option><option>Jazz and improvisation</option><option>Worship and gospel</option><option>Exam pieces</option>
            </select>
          </label>
          <label>What kind of support do you want?
            <select name="support" required>
              <option>Coach only</option><option>Coach plus occasional teacher</option><option>Live teacher coaching</option>
            </select>
          </label>
          <button class="primary-action" type="submit">Create my home page</button>
        </form>
      </div>
    </div>
    <div class="toast" id="toast">Logged in.</div>
    <script>
      (() => {
        const safeSet = (key, value) => {
          try { localStorage.setItem(key, value); } catch {}
        };
        const form = document.getElementById("loginForm");
        const modal = document.getElementById("questionnaireModal");
        const questionnaire = document.getElementById("questionnaireForm");
        form?.addEventListener("submit", (event) => {
          event.preventDefault();
          safeSet("melodiaLoggedIn", "true");
          modal?.classList.add("open");
          modal?.setAttribute("aria-hidden", "false");
        });
        questionnaire?.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(questionnaire);
          safeSet("melodiaProfile", JSON.stringify(Object.fromEntries(data.entries())));
          window.location.href = "index.html";
        });
      })();
    </script>
    <script src="./app.js"></script>
  </body>
</html>
